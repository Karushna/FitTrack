name: fittrack_app
description: A Flutter fitness tracking app with Supabase backend.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter_dotenv: ^5.1.0
  flutter:
    sdk: flutter
  supabase_flutter: ^2.8.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env